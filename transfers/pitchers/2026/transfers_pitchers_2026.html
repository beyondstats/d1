<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transfers — Pitchers 2026 · Beyond Stats D1</title>
  <link rel="stylesheet" href="/d1/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    .loading { padding: 3rem; text-align: center; font-family: var(--mono); font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.08em; }
    .error { padding: 1.5rem; background: #fff5f5; border: 1px solid #fcc; color: #c00; font-size: 0.85rem; margin-bottom: 1.5rem; font-family: var(--mono); }
    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .filter-bar input, .filter-bar select { font-family: var(--mono); font-size: 0.75rem; padding: 0.4rem 0.75rem; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; height: 32px; }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
    .filter-bar input { width: 200px; }
    .badge { display: inline-block; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.04em; padding: 0.15rem 0.4rem; border-radius: 2px; margin-right: 2px; }
    .badge-available { background: #e8f5e9; color: #2e7d32; }
    .badge-committed { background: #e3f2fd; color: #1565c0; }
    .badge-hs { background: #fff3e0; color: #e65100; }
    .badge-college { background: #f3e5f5; color: #6a1b9a; }
    .row-count { font-family: var(--mono); font-size: 0.7rem; color: var(--text-muted); margin-left: auto; align-self: center; }
    thead th.sorted-asc::after { content: ' ↑'; color: var(--accent); }
    thead th.sorted-desc::after { content: ' ↓'; color: var(--accent); }
    .table-wrap { overflow-y: auto; max-height: calc(100vh - 400px); }
    thead th { position: sticky; top: 0; z-index: 2; background: var(--surface); box-shadow: 0 1px 0 var(--border); }
    thead th.group-hdr { position: sticky; top: 0; z-index: 3; background: var(--bg); }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/d1/">Beyond<span>Stats</span> · D1</a>
  <ul class="nav-links">
    <li><a href="/d1/">Home</a></li>
    <li><a href="/d1/stats/hitting/2026/stats_hitting_2026.html">Stats — H</a></li>
    <li><a href="/d1/stats/pitching/2026/stats_pitching_2026.html">Stats — P</a></li>
    <li><a href="/d1/transfers/hitters/2026/transfers_hitters_2026.html">Transfers — H</a></li>
    <li><a href="/d1/transfers/pitchers/2026/transfers_pitchers_2026.html" class="active">Transfers — P</a></li>
    <li><a href="/d1/draft_prospects_2026.html">Draft</a></li>
    <li><a href="/d1/roster_summary_2026.html">Roster Summary</a></li>
  </ul>
</nav>

<main>

  <div id="error-msg" class="error" style="display:none"></div>
  <div id="loading" class="loading">Loading data…</div>

  <div id="app" style="display:none">
      <div class="stat-grid" id="transfer-summary-cards"></div>
      <div class="filter-bar">
        <input type="text" id="transfer-search" placeholder="Search player or school…" />
        <select id="transfer-conf-filter"><option value="">All Conferences</option></select>
        <select id="transfer-school-filter"><option value="">All Schools</option></select>
        <select id="transfer-status-filter">
          <option value="">All</option>
          <option value="available">Available</option>
          <option value="committed">Committed</option>
        </select>
        <span class="row-count" id="transfer-count"></span>
      </div>
      <div class="table-wrap">
        <div class="table-title"><h1 style="font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.4rem);font-weight:700;margin-bottom:1rem;">Transfers — Pitchers — 2026</h1></div>
        <table id="transfer-table">
          <thead><tr>
            <th>Player</th><th>Cl</th><th>From</th><th>Conference</th>
            <th>To</th>
            <th class="num">W</th><th class="num">L</th><th class="num">ERA</th>
            <th class="num">App</th><th class="num">GS</th><th class="num">CG</th><th class="num">SHO</th><th class="num">SV</th>
            <th class="num">IP</th><th class="num">H</th><th class="num">R</th><th class="num">ER</th>
            <th class="num">BB</th><th class="num">K</th><th class="num">HBP</th><th class="num">BAA</th>
          </tr></thead>
          <tbody id="transfer-body"></tbody>
        </table>
      </div>


  </div>
</main>

<footer>
  <span>Beyond Stats · D1 Baseball</span>
  <span>Transfers · Pitchers 2026</span>
</footer>

<script>
function fmt(v,d){if(v===null||v===undefined||v==='')return'—';const n=parseFloat(v);return isNaN(n)?'—':n.toFixed(d);}
function fmtAvg(v){if(v===null||v===undefined||v==='')return'—';const n=parseFloat(v);if(isNaN(n)||n===0)return'—';return n.toFixed(3).replace(/^0/,'');}
function fmtInt(v){if(v===null||v===undefined||v==='')return'—';const n=parseInt(v);return isNaN(n)?'—':n;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const sortState={};

function makeTableSortable(tableId,renderFn){
  const table=document.getElementById(tableId);
  if(!table)return;
  table.querySelectorAll('thead th').forEach((th,i)=>{
    th.addEventListener('click',()=>{
      const k=tableId+'-'+i;
      sortState[k]=sortState[k]==='asc'?'desc':'asc';
      table.querySelectorAll('thead th').forEach(h=>{h.classList.remove('sorted-asc','sorted-desc');});
      th.classList.add(sortState[k]==='asc'?'sorted-asc':'sorted-desc');
      renderFn(i,sortState[k]);
    });
  });
}


function populateSelect(id,values){
  const sel=document.getElementById(id);
  if(!sel)return;
  [...new Set(values.filter(Boolean))].sort().forEach(v=>{
    const o=document.createElement('option');
    o.value=v;o.textContent=v;sel.appendChild(o);
  });
}

async function loadData(){
  try{
    const resp=await fetch('/d1/data/2026_D1Baseball.xlsm');
    if(!resp.ok)throw new Error('File not found ('+resp.status+'). Upload your Excel file to /d1/data/2026_D1Baseball.xlsm in your repo.');
    const buf=await resp.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});

    const transferData=XLSX.utils.sheet_to_json(wb.Sheets['d1baseball_transfers']);

    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    buildTransfers(transferData);
  }catch(e){
    document.getElementById('loading').style.display='none';
    const err=document.getElementById('error-msg');
    err.style.display='block';
    err.textContent='Error loading data: '+e.message;
    document.getElementById('app').style.display='block';
  }
}

function buildTransfers(data){
  data=data.filter(r=>r.pos==='P');
  const avail=data.filter(r=>!r.to_school||r.to_school==='--').length;
  document.getElementById('transfer-summary-cards').innerHTML=`
    <div class="stat-card"><div class="s-label">Total Pitchers</div><div class="s-value">${data.length}</div><div class="s-sub">In portal</div></div>
    <div class="stat-card"><div class="s-label">Available</div><div class="s-value">${avail}</div><div class="s-sub">Not yet committed</div></div>
    <div class="stat-card"><div class="s-label">Committed</div><div class="s-value">${data.length-avail}</div><div class="s-sub">New destination</div></div>`;
  populateSelect('transfer-conf-filter',data.map(r=>r.Conference));
  populateSelect('transfer-school-filter',data.map(r=>r.from_school));

  let sorted=[...data];
  // Player(0) Cl(1) From(2) Conf(3) To(4) W(5) L(6) ERA(7) App(8) GS(9) CG(10) SHO(11) SV(12) IP(13) H(14) R(15) ER(16) BB(17) K(18) HBP(19) BAA(20)
  const keys=['player','class','from_school','Conference','to_school','W','L','ERA','APP','GS','CG','SHO','SV','IP','H2','R2','ER','BB2','K2','HBP2','BA2'];
  function render(ci,dir){
    if(ci!==undefined){
      const k=keys[ci];
      if(k) sorted.sort((a,b)=>{const av=parseFloat(a[k])||a[k]||'';const bv=parseFloat(b[k])||b[k]||'';return dir==='asc'?(av<bv?-1:av>bv?1:0):(av<bv?1:av>bv?-1:0);});
    }
    filterTransfers(sorted);
  }
  ['transfer-search','transfer-conf-filter','transfer-school-filter','transfer-status-filter']
    .forEach(id=>document.getElementById(id).addEventListener(id.includes('search')?'input':'change',()=>filterTransfers(sorted)));
  makeTableSortable('transfer-table',render);
  filterTransfers(sorted);
}

function filterTransfers(data){
  const q=document.getElementById('transfer-search').value.toLowerCase();
  const conf=document.getElementById('transfer-conf-filter').value;
  const school=document.getElementById('transfer-school-filter').value;
  const status=document.getElementById('transfer-status-filter').value;
  const f=data.filter(r=>{
    if(q&&!String(r.player||'').toLowerCase().includes(q)&&!String(r.from_school||'').toLowerCase().includes(q)&&!String(r.to_school||'').toLowerCase().includes(q))return false;
    if(conf&&r.Conference!==conf)return false;
    if(school&&r.from_school!==school)return false;
    const isAvail=!r.to_school||r.to_school==='--';
    if(status==='available'&&!isAvail)return false;
    if(status==='committed'&&isAvail)return false;
    return true;
  });
  document.getElementById('transfer-count').textContent=f.length+' pitchers';
  document.getElementById('transfer-body').innerHTML=f.map(r=>{
    const isAvail=!r.to_school||r.to_school==='--';
    return`<tr>
      <td class="name">${esc(r.player)}</td><td>${esc(r.class)}</td>
      <td>${esc(r.from_school)}</td><td>${esc(r.Conference)}</td>
      <td>${isAvail?'<span style="color:var(--text-muted)">—</span>':esc(r.to_school)}</td>
      <td class="num">${fmtInt(r.W)}</td><td class="num">${fmtInt(r.L)}</td><td class="num">${fmt(r.ERA,2)}</td>
      <td class="num">${fmtInt(r.APP)}</td><td class="num">${fmtInt(r.GS)}</td><td class="num">${fmtInt(r.CG)}</td><td class="num">${fmtInt(r.SHO)}</td><td class="num">${fmtInt(r.SV)}</td>
      <td class="num">${fmt(r.IP,1)}</td><td class="num">${fmtInt(r.H2)}</td><td class="num">${fmtInt(r.R2)}</td><td class="num">${fmtInt(r.ER)}</td>
      <td class="num">${fmtInt(r.BB2)}</td><td class="num">${fmtInt(r.K2)}</td><td class="num">${fmtInt(r.HBP2)}</td><td class="num">${fmtAvg(r.BA2)}</td>
    </tr>`;
  }).join('');
}



loadData();
</script>
</body>
</html>
